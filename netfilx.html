<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netflix Clone</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

/* ===== UPDATED BODY ===== */
body{
    background-image: url("https://thf.bing.com/th/id/OIP.61E1UaSAiZvMq2HVos9M8gHaEK?w=302&h=180&c=7&r=0&o=7&cb=thfc1falcon2&dpr=1.3&pid=1.7&rm=3");
    background-repeat: no-repeat;
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    height:100vh;
}

/* ===== UPDATED OVERLAY ===== */
.overlay{
    width:100%;
    height:100vh;
    background:rgba(0,0,0,0.7);
}

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px 70px;
}

.logo{
    color:#e50914;
    font-size:42px;
    font-weight:bold;
}

.nav-right{
    display:flex;
    gap:15px;
}

select{
    background:black;
    color:white;
    border:1px solid white;
    padding:8px 15px;
    border-radius:3px;
}

.signin{
    background:#e50914;
    color:white;
    border:none;
    padding:8px 18px;
    border-radius:3px;
    cursor:pointer;
}

.content{
    color:white;
    text-align:center;
    margin-top:140px;
}

.content h1{
    font-size:64px;
    font-weight:bold;
}

.content h3{
    margin-top:15px;
    font-size:28px;
    font-weight:normal;
}

.content p{
    margin-top:20px;
    font-size:20px;
}

.email-box{
    margin-top:30px;
    display:flex;
    justify-content:center;
}

.email-box input{
    width:450px;
    height:60px;
    padding-left:15px;
    font-size:18px;
    border:none;
}

.email-box input{
    width:450px;
    height:60px;
    padding-left:15px;
    font-size:18px;
    background:rgba(0,0,0,0.75);
    color:white;
    border:1px solid #777;
    border-radius:4px;
    outline:none;
}

.email-box input::placeholder{
    color:#b3b3b3;
}
.email-box button{
    width:220px;
    height:60px;
    border:none;
    background:#e50914;
    color:white;
    font-size:26px;
    font-weight:bold;
    border-radius:4px;
    cursor:pointer;
    margin-left:8px;
}
</style>
</head>

<body>

<div class="overlay">

    <div class="navbar">

        <div class="logo">NETFLIX</div>

        <div class="nav-right">

            <select>
                <option>English</option>
                <option>Hindi</option>
            </select>

            <button class="signin">Sign In</button>

        </div>

    </div>

    <div class="content">

        <h1>Unlimited movies,<br>TV shows and more</h1>

        <h3>Starts at ₹149. Cancel anytime.</h3>

        <p>
            Ready to watch? Enter your email to create or restart your membership.
        </p>

        <div class="email-box">

            <input type="text" placeholder="Email address">

            <button>Get Started ></button>

        </div>

    </div>

</div>

</body>
</html>
