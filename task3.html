<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        .parent{
            height: 600px;
            width: 400px;
            background-color: dodgerblue;       
            
        }

        .child{
            height: 600px;
            width: 900px;
            border: 2px solid;
        }
        input{
            width: 400px;
            border: none;
            border-bottom: 1px solid blue;
            outline:none
            
            
        }
        button{
            height: 60px solid;
            width: 700px solid;
            background-color: orange;
            color: white;
            border: none;
            display: inline;
        } 
    </style>
</head>
<body>
    <div class="parent">
       
        <div class="child"></div>
        

    </div><br><br>
    <input type="text" placeholder="Enter Email/Mobile Number">
    <br><br>
    <button>Request OTP</button>

</body>
</html>
