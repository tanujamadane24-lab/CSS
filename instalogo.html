<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
     .instagram-logo {
     position: relative;
     width: 150px;
     height: 150px;
     border-radius: 35px;
     /* Multi-color gradient background */
     background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285aeb 90%);
     display: grid;
     place-items: center;
     }

      /* The main camera outline */
     .instagram-logo::before {
     content: '';
     width: 110px;
     height: 110px;
     border: 10px solid #fff;
     border-radius: 32px;
     display: grid;
     place-items: center;
     }

       /* The inner lens and flash dot */
     .instagram-logo::after {
     content: '';
     position: absolute;
     width: 45px;
     height: 45px;
     border: 10px solid #fff;
     border-radius: 50%;
     /* Flash dot created using box-shadow */
     box-shadow: 32px -32px 0 -25px #fff;
     }
    </style>
</head>
<body>
    <div class="instagram-logo"></div>
</body>
</html>
