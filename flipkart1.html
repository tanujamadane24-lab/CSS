<!DOCTYPE html>
<html>
<head>
<title>Flipkart Style Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f1f3f6;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:850px;
    height:550px;
    background:white;
    display:flex;
    box-shadow:0 2px 15px rgba(0,0,0,0.2);
}

.left{
    width:40%;
    background:#2874f0;
    color:white;
    padding:40px 30px;
    position:relative;
}

.left h1{
    font-size:30px;
    margin-bottom:15px;
}

.left p{
    font-size:18px;
    line-height:28px;
}

.left img{
    width:220px;
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
}

.right{
    width:60%;
    padding:50px;
    border-bottom: blue;
}

.input-box{
    width:100%;
    border:none;
    border-bottom:1px solid #999;
    padding:12px 0;
    margin-bottom:25px;
    outline:none;
    font-size:15px;
}

.btn{
    width:100%;
    padding:14px;
    background:#fb641b;
    color:white;
    border:none;
    font-size:16px;
    cursor:pointer;
}

.bottom-link{
    text-align:center;
    margin-top:120px;
}

.bottom-link a{
    text-decoration:none;
    color:#2874f0;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

    <div class="left">
        <h1>Login</h1>

        <p>
            Get access to your Orders,<br>
            Wishlist and Recommendations
        </p>

        <!-- Image -->
        <img src="./img..jpg" alt="">
    </div>

    <div class="right">

        <input type="text" class="input-box" placeholder="Enter Email/Mobile Number">

        <p>By continuing, you agree to Flipkart's Terams Of Use and Privacy Policy</p>
        <br>

        <button class="btn">Request OTP</button>
        <br><br><br><br><br><br><br><br><br><br>

        <div class="bottom-link">
            <a href="#">New to Flipkart? Create an account</a>
        </div>

    </div>

</div>

</body>
</html>
